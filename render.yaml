services:
  # PostgreSQL Database
  - type: postgresql
    name: accountguard-db
    plan: free
    databaseName: accountguard
    user: accountguard

  # FastAPI Backend
  - type: web
    name: accountguard-api
    runtime: python
    pythonVersion: "3.12"
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python -m app.ml.train_model
    startCommand: python -m app.seed.seed && uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: accountguard-db
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        sync: false
        value: '["https://accountguard-ai.vercel.app", "https://accountguard-frontend.onrender.com"]'
      - key: DEBUG
        value: "false"
      - key: MODEL_PATH
        value: "app/ml/model/model.pkl"
      - key: SCALER_PATH
        value: "app/ml/model/scaler.pkl"
      - key: SEED_FORCE
        value: "false"
      - key: PYTHONUNBUFFERED
        value: "1"

  # React Frontend (Static Site)
  - type: static_site
    name: accountguard-frontend
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_BASE_URL
        value: "https://bob-testing.onrender.com/api/v1"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
